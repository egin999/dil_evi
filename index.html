<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dil Evi - Real-time Voice Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .controls {
            padding: 15px;
            background: #f5f5f5;
            border-bottom: 1px solid #eee;
        }

        .character-select {
            margin-bottom: 12px;
        }

        .character-select label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            color: #333;
        }

        .character-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .char-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .char-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .char-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .char-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .start-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .start-button:active {
            transform: translateY(0);
        }

        .start-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            padding: 10px 15px;
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            font-size: 12px;
            color: #1565c0;
        }

        .status.error {
            background: #ffebee;
            border-left-color: #f44336;
            color: #c62828;
        }

        .status.success {
            background: #e8f5e9;
            border-left-color: #4caf50;
            color: #2e7d32;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-user {
            text-align: right;
        }

        .message-text {
            display: inline-block;
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message-user .message-text {
            background: #667eea;
            color: white;
        }

        .message-ai .message-text {
            background: #e0e0e0;
            color: #333;
        }

        .message-label {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #666;
        }

        .message-user .message-label {
            text-align: right;
            color: #667eea;
        }

        .message-ai .message-label {
            color: #764ba2;
        }

        .recording-indicator {
            display: none;
            text-align: center;
            padding: 10px;
            background: #ffebee;
            color: #f44336;
            font-weight: bold;
            font-size: 12px;
            animation: pulse 1s infinite;
        }

        .recording-indicator.active {
            display: block;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .record-button {
            width: 100%;
            padding: 16px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .record-button:hover {
            background: #45a049;
            transform: scale(1.02);
        }

        .record-button:active {
            transform: scale(0.98);
        }

        .record-button.recording {
            background: #f44336;
            animation: pulse 1s infinite;
        }

        .record-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .footer {
            padding: 10px;
            text-align: center;
            font-size: 11px;
            color: #999;
            border-top: 1px solid #eee;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile optimizations */
        @media (max-width: 480px) {
            .container {
                max-height: 100vh;
                border-radius: 0;
            }

            .header {
                border-radius: 0;
                padding: 15px;
            }

            .header h1 {
                font-size: 24px;
            }

            .char-btn {
                font-size: 11px;
                padding: 8px;
            }

            .message-text {
                font-size: 13px;
            }

            .record-button {
                padding: 14px;
                font-size: 14px;
            }
        }

        .scroll-to-bottom {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Dil Evi</h1>
            <p>Real-time İngilizce Pratik</p>
        </div>

        <div class="controls">
            <div class="character-select">
                <label>👥 Öğretmeni Seç</label>
                <div class="character-buttons">
                    <button class="char-btn active" data-char="Amelia">Amelia</button>
                    <button class="char-btn" data-char="Sarah">Sarah</button>
                    <button class="char-btn" data-char="James">James</button>
                </div>
            </div>

            <button class="start-button" id="startBtn">🎤 Başla</button>
        </div>

        <div class="status" id="status">✅ Hazır</div>

        <div class="recording-indicator" id="recordingIndicator">
            🔴 REC - Konuşma algılanıyor...
        </div>

        <div class="chat-container" id="chatContainer">
            <p style="text-align: center; color: #999; padding: 20px;">
                Konuşmaya başladığında burada görünecek...
            </p>
        </div>

        <button class="record-button" id="recordBtn" disabled>🎤 Tap to Speak</button>

        <div class="footer">
            <p>Gradio Link'i aç ve konuş!</p>
        </div>
    </div>

    <script>
        const CHARACTERS = {
            'Amelia': 'sage',
            'Sarah': 'shimmer',
            'James': 'echo'
        };

        let selectedCharacter = 'Amelia';
        let isConnected = false;
        let isRecording = false;
        let mediaRecorder = null;
        let audioContext = null;
        let audioChunks = [];
        let ws = null;

        const startBtn = document.getElementById('startBtn');
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const chatContainer = document.getElementById('chatContainer');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const charButtons = document.querySelectorAll('.char-btn');

        // Character selection
        charButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isConnected) return;
                charButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedCharacter = btn.dataset.char;
            });
        });

        // Start conversation
        startBtn.addEventListener('click', async () => {
            if (isConnected) return;

            try {
                // Request microphone access
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                    }
                });

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                mediaRecorder = new MediaRecorder(stream);

                // Setup WebSocket
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws`;
                
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    isConnected = true;
                    startBtn.disabled = true;
                    recordBtn.disabled = false;
                    charButtons.forEach(b => b.disabled = true);
                    
                    updateStatus('✅ Bağlandı!', 'success');
                    
                    // Send initial message
                    ws.send(JSON.stringify({
                        type: 'init',
                        character: selectedCharacter
                    }));
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'transcription') {
                        addMessage('user', data.text);
                    } else if (data.type === 'response') {
                        addMessage('ai', data.text);
                    } else if (data.type === 'audio') {
                        playAudio(data.audio);
                    } else if (data.type === 'error') {
                        updateStatus(`❌ ${data.message}`, 'error');
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateStatus('❌ Bağlantı hatası', 'error');
                    disconnect();
                };

                ws.onclose = () => {
                    disconnect();
                    updateStatus('🔌 Bağlantı kesildi', 'error');
                };

            } catch (error) {
                console.error('Error:', error);
                updateStatus(`❌ ${error.message}`, 'error');
            }
        });

        // Record button
        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('touchstart', startRecording);
        recordBtn.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('touchend', stopRecording);

        async function startRecording(e) {
            if (!isConnected || !mediaRecorder) return;
            
            e.preventDefault();
            isRecording = true;
            audioChunks = [];
            
            recordBtn.classList.add('recording');
            recordingIndicator.classList.add('active');
            recordBtn.textContent = '⏹️ Konuşma algılanıyor...';
            
            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };

            mediaRecorder.start();
        }

        async function stopRecording(e) {
            if (!isRecording || !mediaRecorder) return;
            
            e.preventDefault();
            isRecording = false;
            
            recordBtn.classList.remove('recording');
            recordingIndicator.classList.remove('active');
            recordBtn.textContent = '🎤 Tap to Speak';
            
            mediaRecorder.stop();
            
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                
                // Convert to base64
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result.split(',')[1];
                    
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            type: 'audio',
                            audio: base64,
                            character: selectedCharacter
                        }));
                    }
                };
                reader.readAsDataURL(audioBlob);
            };
        }

        function addMessage(type, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type === 'user' ? 'user' : 'ai'}`;
            
            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = type === 'user' ? '👤 You' : `🤖 ${selectedCharacter}`;
            
            const messageText = document.createElement('div');
            messageText.className = 'message-text';
            messageText.textContent = text;
            
            messageDiv.appendChild(label);
            messageDiv.appendChild(messageText);
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function updateStatus(message, type = 'info') {
            status.textContent = message;
            status.className = `status ${type}`;
        }

        function playAudio(base64Audio) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const binaryString = atob(base64Audio);
            const bytes = new Uint8Array(binaryString.length);
            
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            
            audioContext.decodeAudioData(bytes.buffer, (audioBuffer) => {
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioContext.destination);
                source.start(0);
            });
        }

        function disconnect() {
            isConnected = false;
            isRecording = false;
            startBtn.disabled = false;
            recordBtn.disabled = true;
            recordBtn.classList.remove('recording');
            recordingIndicator.classList.remove('active');
            charButtons.forEach(b => b.disabled = false);
            
            if (ws) {
                ws.close();
            }
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>
